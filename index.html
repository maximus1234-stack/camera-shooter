<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Camera Shooter</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:#000;
    touch-action:none;
    user-select:none;
    -webkit-user-select:none;
  }
  #camera {
    position:fixed; inset:0;
    width:100%; height:100%;
    object-fit:cover; z-index:0;
  }
  #vignette {
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background: radial-gradient(ellipse at 50% 40%, transparent 45%, rgba(0,0,0,0.55) 100%);
  }
  #screen-flash {
    position:fixed; inset:0; z-index:40; pointer-events:none;
    background:rgba(255,210,100,0.2); opacity:0;
  }

/* GUN WRAP — large, anchored bottom-right, bleeds off edges */
#gun-wrap {
position:fixed;
z-index:20;
pointer-events:none;
will-change:transform;
width: min(108vw, 580px);
height: min(108vw, 580px);
right:  -14vw;
bottom: calc(env(safe-area-inset-bottom, 0px) - 10vw);
transform: rotate(-28deg);
transform-origin: 72% 78%;
}
#gun-wrap svg { width:100%; height:100%; display:block; }

/* MUZZLE FLASH */
#muzzle-flash {
position:fixed; z-index:25; pointer-events:none;
opacity:0; transform:translate(-50%,-50%) scale(0.2);
width:90px; height:90px; border-radius:50%;
background: radial-gradient(circle, #fff 0%, #ffe566 25%, #ff8800 55%, transparent 75%);
filter:blur(2px);
mix-blend-mode:screen;
}
#muzzle-dot {
position:fixed; z-index:30; pointer-events:none;
width:14px; height:14px; border-radius:50%;
background:#ff0044; border:2px solid #fff;
transform:translate(-50%,-50%); display:none;
}

/* BULLETS */
.bullet {
position:fixed; z-index:22; pointer-events:none;
border-radius:50%;
background: radial-gradient(circle, #fff 0%, #ffe566 40%, #ff9900 70%, transparent 100%);
box-shadow:0 0 10px 4px #ff9900;
mix-blend-mode:screen;
will-change:transform,opacity;
}

/* START SCREEN */
#start-screen {
position:fixed; inset:0; z-index:50;
display:flex; flex-direction:column;
align-items:center; justify-content:center;
background:#000; gap:20px;
transition:opacity 0.5s ease;
}
#start-screen.hidden { opacity:0; pointer-events:none; }
#start-icon { font-size:62px; animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:0.6} }
#start-label {
font-family:‘Courier New’,monospace;
font-size:clamp(16px,4vw,20px);
letter-spacing:0.25em; text-transform:uppercase;
color:rgba(255,255,255,0.9);
}
#start-sub {
font-family:‘Courier New’,monospace;
font-size:12px; letter-spacing:0.18em;
color:rgba(255,255,255,0.28); text-transform:uppercase;
}
</style>

</head>
<body>

<div id="screen-flash"></div>
<div id="muzzle-flash"></div>

<div id="start-screen">
  <div id="start-icon">🔫</div>
  <div id="start-label">Tap to Start</div>
  <div id="start-sub">camera shooter</div>
</div>

<script>
/* ================================================================
   TUNING CONSTANTS
================================================================ */
const GUN_ROT_DEG   = -28;   // rotation angle (neg = barrel toward upper-left)
const MUZZLE_X_PCT  = 5.2;   // % across gun element where barrel tip sits
const MUZZLE_Y_PCT  = 32.0;  // % down  gun element where barrel tip sits

const RECOIL_X      = 20;    // px right kick
const RECOIL_Y      = -26;   // px up kick
const RECOIL_ROT    = 6;     // extra degrees on recoil
const RECOIL_IN_MS  = 55;
const RECOIL_OUT_MS = 175;

const FLASH_SCALE   = 1.7;
const FLASH_IN_MS   = 22;
const FLASH_OUT_MS  = 105;

const SCREEN_FLASH  = true;
const SCREEN_FL_MS  = 72;

const BULLET_SIZE   = 11;
const BULLET_SPEED  = 1500;
const BULLET_ANG    = -118;  // degrees — matches barrel direction
const BULLET_LIFE   = 480;

const FIRE_RATE_MS  = 130;
const AUTO_FIRE     = true;

const SHOW_DOT      = false; // true = red calibration dot at muzzle

/* ================================================================
   ELEMENTS & STATE
================================================================ */
const $cam   = document.getElementById('camera');
const $start = document.getElementById('start-screen');
const $wrap  = document.getElementById('gun-wrap');
const $flash = document.getElementById('muzzle-flash');
const $dot   = document.getElementById('muzzle-dot');
const $sf    = document.getElementById('screen-flash');

let ready = false, lastFire = 0, autoH = null;
let mx = 0, my = 0; // muzzle world coords

/* ================================================================
   MUZZLE CALC
   We find the barrel tip in world space by:
   1. Getting the bounding rect of the (rotated) element
   2. Computing the local offset of the muzzle point
   3. Rotating that offset by GUN_ROT_DEG around the transform-origin
================================================================ */
function calcMuzzle() {
  const r   = $wrap.getBoundingClientRect();
  const w   = r.width, h = r.height;
  const lx  = (MUZZLE_X_PCT / 100) * w;
  const ly  = (MUZZLE_Y_PCT / 100) * h;
  const ox  = 0.72 * w;   // transform-origin x
  const oy  = 0.78 * h;   // transform-origin y
  const dx  = lx - ox, dy = ly - oy;
  const rad = GUN_ROT_DEG * Math.PI / 180;
  mx = (r.left + ox) + dx * Math.cos(rad) - dy * Math.sin(rad);
  my = (r.top  + oy) + dx * Math.sin(rad) + dy * Math.cos(rad);
  $flash.style.left = mx + 'px';
  $flash.style.top  = my + 'px';
  if (SHOW_DOT) {
    $dot.style.display = 'block';
    $dot.style.left = mx + 'px';
    $dot.style.top  = my + 'px';
  }
}
window.addEventListener('resize', calcMuzzle);
window.addEventListener('orientationchange', () => setTimeout(calcMuzzle, 350));
setTimeout(calcMuzzle, 250);

/* ================================================================
   CAMERA
================================================================ */
async function startCam() {
  if (ready) return;
  const tryStart = async (constraints) => {
    const s = await navigator.mediaDevices.getUserMedia(constraints);
    $cam.srcObject = s; await $cam.play();
    ready = true;
    $start.classList.add('hidden');
    setTimeout(() => $start.style.display = 'none', 600);
    calcMuzzle();
  };
  try {
    await tryStart({ video:{ facingMode:{exact:'environment'}, width:{ideal:1920}, height:{ideal:1080} }, audio:false });
  } catch {
    try {
      await tryStart({ video:{ facingMode:'environment' }, audio:false });
    } catch(e) {
      document.getElementById('start-label').textContent = 'Camera error';
      document.getElementById('start-sub').textContent   = e.message;
    }
  }
}

/* ================================================================
   FIRE
================================================================ */
function fire() {
  const now = performance.now();
  if (now - lastFire < FIRE_RATE_MS) return;
  lastFire = now;
  calcMuzzle();
  recoil(); muzzleFlash(); spawnBullet();
  if (SCREEN_FLASH) screenFlash();
  if (navigator.vibrate) navigator.vibrate(16);
}

function recoil() {
  $wrap.style.transition = `transform ${RECOIL_IN_MS}ms cubic-bezier(0.1,0.8,0.4,1)`;
  $wrap.style.transform  = `rotate(${GUN_ROT_DEG + RECOIL_ROT}deg) translate(${RECOIL_X}px,${RECOIL_Y}px)`;
  setTimeout(() => {
    $wrap.style.transition = `transform ${RECOIL_OUT_MS}ms cubic-bezier(0.25,0.46,0.45,0.94)`;
    $wrap.style.transform  = `rotate(${GUN_ROT_DEG}deg)`;
    setTimeout(calcMuzzle, RECOIL_OUT_MS + 20);
  }, RECOIL_IN_MS);
}

function muzzleFlash() {
  const rot = Math.random() * 70 - 35;
  $flash.style.transition = 'none';
  $flash.style.opacity    = '0';
  $flash.style.transform  = `translate(-50%,-50%) scale(0.15) rotate(${rot}deg)`;
  void $flash.offsetWidth;
  $flash.style.transition = `opacity ${FLASH_IN_MS}ms ease-out, transform ${FLASH_IN_MS}ms ease-out`;
  $flash.style.opacity    = '1';
  $flash.style.transform  = `translate(-50%,-50%) scale(${FLASH_SCALE}) rotate(${rot}deg)`;
  setTimeout(() => {
    $flash.style.transition = `opacity ${FLASH_OUT_MS}ms ease-in, transform ${FLASH_OUT_MS}ms ease-in`;
    $flash.style.opacity    = '0';
    $flash.style.transform  = `translate(-50%,-50%) scale(0.1) rotate(${rot}deg)`;
  }, FLASH_IN_MS);
}

function screenFlash() {
  $sf.style.transition = 'none';
  $sf.style.opacity    = '1';
  void $sf.offsetWidth;
  $sf.style.transition = `opacity ${SCREEN_FL_MS}ms ease-out`;
  $sf.style.opacity    = '0';
}

function spawnBullet() {
  const el = document.createElement('div');
  el.className = 'bullet';
  el.style.cssText = `width:${BULLET_SIZE}px;height:${BULLET_SIZE}px;left:${mx}px;top:${my}px;transform:translate(-50%,-50%);`;
  document.body.appendChild(el);
  const rad = BULLET_ANG * Math.PI / 180;
  const dx  = Math.cos(rad), dy = Math.sin(rad);
  let t0 = null;
  (function step(ts) {
    if (!t0) t0 = ts;
    const e = ts - t0;
    if (e >= BULLET_LIFE) { el.remove(); return; }
    const p    = e / BULLET_LIFE;
    const dist = BULLET_SPEED * e / 1000;
    const fade = p > 0.55 ? 1 - (p - 0.55) / 0.45 : 1;
    const sc   = 1 - p * 0.55;
    el.style.left      = (mx + dx * dist) + 'px';
    el.style.top       = (my + dy * dist) + 'px';
    el.style.opacity   = fade;
    el.style.transform = `translate(-50%,-50%) scale(${sc})`;
    requestAnimationFrame(step);
  })(performance.now());
}

/* ================================================================
   INPUT
================================================================ */
document.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (!ready) { startCam(); return; }
  fire();
  if (AUTO_FIRE) autoH = setInterval(fire, FIRE_RATE_MS);
}, { passive:false });

['pointerup','pointercancel'].forEach(ev =>
  document.addEventListener(ev, () => { clearInterval(autoH); autoH = null; })
);
document.addEventListener('contextmenu', e => e.preventDefault());
</script>

</body>
</html>
