<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Camera Shooter</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
width: 100%; height: 100%;
overflow: hidden;
background: #000;
touch-action: none;
user-select: none;
-webkit-user-select: none;
}

/* ── CAMERA ─────────────────────────────────────────── */
#camera {
position: fixed;
inset: 0;
width: 100%; height: 100%;
object-fit: cover;
z-index: 0;
}

/* vignette darkens edges for FPS immersion */
#vignette {
position: fixed; inset: 0; z-index: 1;
pointer-events: none;
background: radial-gradient(ellipse at 50% 44%,
transparent 36%, rgba(0,0,0,0.68) 100%);
}

/* ── SCREEN FLASH ────────────────────────────────────── */
#screen-flash {
position: fixed; inset: 0; z-index: 38;
pointer-events: none;
background: rgba(255, 200, 80, 0.22);
opacity: 0;
}

/* ── GUN SPRITE ──────────────────────────────────────────
All positional tuning is done via JS constants below.
The <img> fills this wrapper.
─────────────────────────────────────────────────────── */
#gun-wrap {
position: fixed;
z-index: 20;
pointer-events: none;
will-change: transform;
/* transform-origin is set by JS to the muzzle point so
recoil pivots naturally around the barrel tip */
}

#gun-img {
display: block;
width: 100%;
height: 100%;
object-fit: contain;
/* preserve transparency */
image-rendering: high-quality;
}

/* ── MUZZLE FLASH ────────────────────────────────────── */
#muzzle-flash {
position: fixed;
z-index: 25;
pointer-events: none;
opacity: 0;
transform: translate(-50%, -50%) scale(0.1);
width: 110px; height: 110px;
border-radius: 50%;
background: radial-gradient(circle,
#ffffff   0%,
#ffee88  18%,
#ff8800  48%,
transparent 72%
);
filter: blur(2.5px);
mix-blend-mode: screen;
}

/* softer outer glow ring */
#muzzle-glow {
position: fixed;
z-index: 24;
pointer-events: none;
opacity: 0;
transform: translate(-50%, -50%) scale(0.1);
width: 190px; height: 190px;
border-radius: 50%;
background: radial-gradient(circle,
rgba(255,150,0,0.55) 0%,
transparent 65%
);
filter: blur(12px);
mix-blend-mode: screen;
}

/* ── MUZZLE DEBUG DOT ────────────────────────────────── */
#muzzle-dot {
position: fixed;
z-index: 30;
pointer-events: none;
width: 14px; height: 14px;
border-radius: 50%;
background: #ff0044;
border: 2px solid #ffffff;
transform: translate(-50%, -50%);
display: none;
box-shadow: 0 0 6px #ff0044;
}

/* ── BULLET PROJECTILES ──────────────────────────────── */
.bullet {
position: fixed;
z-index: 22;
pointer-events: none;
border-radius: 50%;
background: radial-gradient(circle,
#ffffff   0%,
#ffe566  35%,
#ff9900  65%,
transparent 100%
);
box-shadow: 0 0 12px 5px rgba(255, 138, 0, 0.85);
mix-blend-mode: screen;
will-change: transform, opacity;
}

/* ── START / PERMISSION SCREEN ───────────────────────── */
#start-screen {
position: fixed; inset: 0; z-index: 50;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
background: #000;
gap: 22px;
transition: opacity 0.5s ease;
}
#start-screen.hidden { opacity: 0; pointer-events: none; }

#start-icon { font-size: 64px; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse {
0%, 100% { transform: scale(1);    opacity: 1;   }
50%       { transform: scale(1.1); opacity: 0.6; }
}

#start-label {
font-family: ‘Courier New’, monospace;
font-size: clamp(15px, 3.8vw, 19px);
letter-spacing: 0.26em;
text-transform: uppercase;
color: rgba(255,255,255,0.88);
}
#start-sub {
font-family: ‘Courier New’, monospace;
font-size: 11px;
letter-spacing: 0.16em;
color: rgba(255,255,255,0.26);
text-transform: uppercase;
}
#start-error {
font-family: ‘Courier New’, monospace;
font-size: 11px;
color: rgba(255,80,80,0.8);
text-align: center;
max-width: 80vw;
display: none;
}
</style>

</head>
<body>

<video id="camera" autoplay playsinline muted></video>

<div id="vignette"></div>
<div id="screen-flash"></div>
<div id="muzzle-flash"></div>
<div id="muzzle-glow"></div>
<div id="muzzle-dot"></div>

<!-- ═══════════════════════════════════════════════════════
     GUN SPRITE
     ───────────────────────────────────────────────────────
     GUN_SRC below points to gun.png in the same repo folder.

     HOW TO GET A GOOD SPRITE:
     ─────────────────────────
     Search Google Images for:
       "AR-15 first person PNG transparent"
       "FPS weapon sprite transparent PNG"
       "free FPS gun overlay transparent"

     Good free sources:
       • PNGWing.com  → search "gun first person"
       • PNGEgg.com   → search "FPS gun transparent"
       • WikiMedia Commons (public domain weapon renders)
       • itch.io free asset packs (search "FPS hands weapon")
         e.g. https://quaternius.com/packs/ultimateFPS.html

     Recommended spec:
       • PNG with transparent background
       • At least 800×600px
       • Shows a held weapon from FPS perspective (hand visible)
       • Barrel pointing toward upper-left when positioned

     Save the file as:  gun.png
     Put it in the root of your repo next to index.html.
     ─────────────────────────────────────────────────────── -->

<div id="gun-wrap">
  <img id="gun-img" src="gun.png" alt="" draggable="false"
       onerror="handleGunLoadError()">
</div>

<div id="start-screen">
  <div id="start-icon">🎯</div>
  <div id="start-label">Tap to Start</div>
  <div id="start-sub">camera shooter</div>
  <div id="start-error"></div>
</div>

<script>
/* ===================================================================
   ████  TUNING CONSTANTS — edit these to adjust everything  ████
   ===================================================================

   All measurements are in either:
     vw  = % of viewport width
     vh  = % of viewport height
     px  = pixels
     deg = degrees

   Tip: set SHOW_MUZZLE_DOT = true, then tap to see a red dot
   exactly where the muzzle is. Adjust MUZZLE_X_PCT / MUZZLE_Y_PCT
   until the dot lines up with the barrel tip in your sprite.
=================================================================== */

// ── Gun image source ─────────────────────────────────────────────
// Change this string to use a different file or absolute URL.
// Must be a transparent PNG or WebP with the weapon already
// showing a first-person held perspective (hand included).
const GUN_SRC = 'gun.png';

// ── Gun wrapper size ─────────────────────────────────────────────
const GUN_WIDTH_VW   = 96;    // width of gun wrapper as % of viewport width

// ── Gun position (right-bottom anchor) ───────────────────────────
// Positive values move gun further INTO the screen.
// Negative values move it further off-screen edge.
const GUN_RIGHT_VW   = -18;   // horizontal offset from right edge (vw)
const GUN_BOTTOM_VH  = -14;   // vertical offset from bottom edge (vh)

// ── Gun rotation ─────────────────────────────────────────────────
// Negative = barrel tilts toward upper-left (standard FPS look)
const GUN_ROT_DEG    = -18;

// ── Transform-origin (pivot point for recoil rotation) ───────────
// As % of the gun wrapper. Set near the grip / rear of gun.
const PIVOT_X_PCT    = 78;
const PIVOT_Y_PCT    = 82;

// ── Muzzle tip position ───────────────────────────────────────────
// As % of the gun wrapper bounding box BEFORE rotation.
// 0,0 = top-left corner. Tune with SHOW_MUZZLE_DOT = true.
const MUZZLE_X_PCT   = 8.5;
const MUZZLE_Y_PCT   = 28.0;

// ── Recoil ────────────────────────────────────────────────────────
const RECOIL_X_PX    = 16;    // px kick right
const RECOIL_Y_PX    = -22;   // px kick up (negative = up)
const RECOIL_ROT_DEG = 6;     // extra clockwise tilt at peak
const RECOIL_IN_MS   = 48;    // ms to reach peak recoil
const RECOIL_OUT_MS  = 185;   // ms to return to rest

// ── Muzzle flash ─────────────────────────────────────────────────
const FLASH_SCALE    = 1.9;   // max scale of flash burst
const FLASH_IN_MS    = 18;    // rise time (ms)
const FLASH_OUT_MS   = 115;   // decay time (ms)

// ── Bullet ───────────────────────────────────────────────────────
const BULLET_SIZE_PX = 11;    // diameter in px
const BULLET_SPEED   = 1600;  // px per second
// Direction the bullet travels. Should match your gun's barrel angle.
// -90 = straight up, -120 = upper-left (typical FPS)
const BULLET_ANGLE_DEG = -115;
const BULLET_LIFE_MS = 460;   // ms before bullet is removed

// ── Fire rate ─────────────────────────────────────────────────────
const FIRE_RATE_MS   = 120;   // minimum ms between shots (8 shots/sec)
const AUTO_FIRE_ON_HOLD = true; // set false to require individual taps

// ── Debug ────────────────────────────────────────────────────────
// Set to true to see a red dot at the computed muzzle position.
// Fine-tune MUZZLE_X_PCT / MUZZLE_Y_PCT until it lines up,
// then set back to false.
const SHOW_MUZZLE_DOT = false;

/* ===================================================================
   RUNTIME — do not need to edit below this line
=================================================================== */

const $cam    = document.getElementById('camera');
const $start  = document.getElementById('start-screen');
const $err    = document.getElementById('start-error');
const $wrap   = document.getElementById('gun-wrap');
const $img    = document.getElementById('gun-img');
const $flash  = document.getElementById('muzzle-flash');
const $glow   = document.getElementById('muzzle-glow');
const $dot    = document.getElementById('muzzle-dot');
const $sf     = document.getElementById('screen-flash');

let cameraReady = false;
let lastFireTime = 0;
let autoFireHandle = null;
let muzzleX = 0, muzzleY = 0;

// ── Gun missing fallback ─────────────────────────────────────────
function handleGunLoadError() {
  // If gun.png is missing, show instructions overlay on the gun wrap
  $wrap.innerHTML = `
    <div style="
      font-family:'Courier New',monospace;
      font-size:clamp(10px,2.5vw,13px);
      color:rgba(255,200,80,0.9);
      background:rgba(0,0,0,0.75);
      border:1px solid rgba(255,200,80,0.4);
      border-radius:10px;
      padding:18px 22px;
      max-width:300px;
      line-height:1.7;
      text-align:left;
    ">
      <b style="font-size:1.2em">⚠️ gun.png missing</b><br><br>
      Add a transparent FPS weapon PNG to your repo root named
      <b>gun.png</b>.<br><br>
      Good free sources:<br>
      • pngegg.com → "fps gun transparent"<br>
      • pngwing.com → "gun first person"<br>
      • itch.io free asset packs<br><br>
      Then commit it alongside index.html.
    </div>
  `;
  $wrap.style.cssText = `
    position:fixed; z-index:20;
    bottom: calc(env(safe-area-inset-bottom,0px) + 20px);
    right: 16px;
    pointer-events:none;
  `;
}

// ── Position gun wrapper ─────────────────────────────────────────
function positionGun() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const safeBottom = getSafeAreaBottom();

  const w = vw * (GUN_WIDTH_VW / 100);
  // Maintain natural aspect ratio of the image once loaded
  const imgNaturalRatio = ($img.naturalWidth && $img.naturalHeight)
    ? $img.naturalHeight / $img.naturalWidth
    : 0.65; // fallback ratio
  const h = w * imgNaturalRatio;

  const rightOffset  = vw * (GUN_RIGHT_VW  / 100);
  const bottomOffset = vh * (GUN_BOTTOM_VH / 100);

  const left = vw - w + rightOffset;
  const top  = vh - h - bottomOffset - safeBottom;

  $wrap.style.cssText = `
    position: fixed;
    left: ${left}px;
    top: ${top}px;
    width: ${w}px;
    height: ${h}px;
    z-index: 20;
    pointer-events: none;
    will-change: transform;
    transform-origin: ${PIVOT_X_PCT}% ${PIVOT_Y_PCT}%;
    transform: rotate(${GUN_ROT_DEG}deg);
  `;

  // Recompute muzzle after layout settles
  requestAnimationFrame(calcMuzzle);
}

// Read iOS safe area inset via probe element
function getSafeAreaBottom() {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;bottom:0;left:0;width:1px;height:env(safe-area-inset-bottom,0px);pointer-events:none;visibility:hidden;';
  document.body.appendChild(el);
  const h = el.getBoundingClientRect().height;
  document.body.removeChild(el);
  return h;
}

// ── Muzzle world-space position ──────────────────────────────────
// We calculate by taking the muzzle's local offset from the
// transform-origin, rotating it by GUN_ROT_DEG, then adding
// the origin's world position.
function calcMuzzle() {
  const r  = $wrap.getBoundingClientRect();
  const w  = r.width, h = r.height;

  // Local coords of muzzle within un-rotated element
  const lx = (MUZZLE_X_PCT / 100) * w;
  const ly = (MUZZLE_Y_PCT / 100) * h;

  // Local coords of pivot / transform-origin
  const px = (PIVOT_X_PCT / 100) * w;
  const py = (PIVOT_Y_PCT / 100) * h;

  // Vector from pivot to muzzle
  const dx = lx - px, dy = ly - py;

  // Rotate vector by GUN_ROT_DEG
  const rad = GUN_ROT_DEG * Math.PI / 180;
  const rx  = dx * Math.cos(rad) - dy * Math.sin(rad);
  const ry  = dx * Math.sin(rad) + dy * Math.cos(rad);

  // World position of pivot = bounding rect top-left + pivot offset
  // (getBoundingClientRect already accounts for rotation)
  // We need to un-rotate the bounding rect to find the element's
  // true (un-transformed) top-left. Easier: just offset from r.left/r.top
  // using the known formula: pivot world = r.left + px_rotated
  // Simpler approximation that's accurate for our use case:
  const pivotWorldX = r.left + r.width  * (PIVOT_X_PCT / 100);
  const pivotWorldY = r.top  + r.height * (PIVOT_Y_PCT / 100);

  muzzleX = pivotWorldX + rx;
  muzzleY = pivotWorldY + ry;

  // Apply to flash elements
  $flash.style.left = $glow.style.left = muzzleX + 'px';
  $flash.style.top  = $glow.style.top  = muzzleY + 'px';

  if (SHOW_MUZZLE_DOT) {
    $dot.style.display = 'block';
    $dot.style.left = muzzleX + 'px';
    $dot.style.top  = muzzleY + 'px';
  } else {
    $dot.style.display = 'none';
  }
}

// Reposition on image load (we now know the natural aspect ratio)
$img.addEventListener('load', () => {
  positionGun();
});

window.addEventListener('resize', positionGun);
window.addEventListener('orientationchange', () => setTimeout(positionGun, 320));

// Initial layout pass (image may already be cached)
positionGun();

// ── CAMERA ───────────────────────────────────────────────────────
async function startCamera() {
  if (cameraReady) return;

  const attemptStart = async (constraints) => {
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    $cam.srcObject = stream;
    await $cam.play();
    cameraReady = true;
    $start.classList.add('hidden');
    setTimeout(() => { $start.style.display = 'none'; }, 600);
    positionGun(); // recalculate after camera starts
  };

  try {
    await attemptStart({
      video: {
        facingMode: { exact: 'environment' },
        width:  { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    });
  } catch {
    try {
      await attemptStart({
        video: { facingMode: 'environment' },
        audio: false
      });
    } catch (e) {
      document.getElementById('start-label').textContent = 'Camera unavailable';
      $err.style.display = 'block';
      $err.textContent = e.message;
    }
  }
}

// ── FIRE ─────────────────────────────────────────────────────────
function fire() {
  const now = performance.now();
  if (now - lastFireTime < FIRE_RATE_MS) return;
  lastFireTime = now;

  calcMuzzle(); // always use freshest muzzle position
  doRecoil();
  doMuzzleFlash();
  spawnBullet();
  doScreenFlash();
  if (navigator.vibrate) navigator.vibrate(15);
}

// ── Recoil ───────────────────────────────────────────────────────
function doRecoil() {
  const kickTransform = `
    rotate(${GUN_ROT_DEG + RECOIL_ROT_DEG}deg)
    translate(${RECOIL_X_PX}px, ${RECOIL_Y_PX}px)
  `;
  $wrap.style.transition = `transform ${RECOIL_IN_MS}ms cubic-bezier(0.1, 0.8, 0.4, 1)`;
  $wrap.style.transform  = kickTransform;

  setTimeout(() => {
    $wrap.style.transition = `transform ${RECOIL_OUT_MS}ms cubic-bezier(0.25, 0.46, 0.45, 0.94)`;
    $wrap.style.transform  = `rotate(${GUN_ROT_DEG}deg)`;
    setTimeout(calcMuzzle, RECOIL_OUT_MS + 20);
  }, RECOIL_IN_MS);
}

// ── Muzzle flash ─────────────────────────────────────────────────
function doMuzzleFlash() {
  const rot = Math.random() * 80 - 40; // random spin each shot

  const reset = (el) => {
    el.style.transition = 'none';
    el.style.opacity    = '0';
    el.style.transform  = `translate(-50%, -50%) scale(0.12) rotate(${rot}deg)`;
  };
  reset($flash); reset($glow);
  void $flash.offsetWidth; // force reflow

  const show = (el, scale) => {
    el.style.transition = `opacity ${FLASH_IN_MS}ms ease-out, transform ${FLASH_IN_MS}ms ease-out`;
    el.style.opacity    = '1';
    el.style.transform  = `translate(-50%, -50%) scale(${scale}) rotate(${rot}deg)`;
  };
  show($flash, FLASH_SCALE);
  show($glow,  FLASH_SCALE * 1.5);

  setTimeout(() => {
    const hide = (el) => {
      el.style.transition = `opacity ${FLASH_OUT_MS}ms ease-in, transform ${FLASH_OUT_MS}ms ease-in`;
      el.style.opacity    = '0';
      el.style.transform  = `translate(-50%, -50%) scale(0.08) rotate(${rot}deg)`;
    };
    hide($flash); hide($glow);
  }, FLASH_IN_MS);
}

// ── Screen flash ─────────────────────────────────────────────────
function doScreenFlash() {
  $sf.style.transition = 'none';
  $sf.style.opacity    = '1';
  void $sf.offsetWidth;
  $sf.style.transition = 'opacity 82ms ease-out';
  $sf.style.opacity    = '0';
}

// ── Bullet ───────────────────────────────────────────────────────
function spawnBullet() {
  const el = document.createElement('div');
  el.className = 'bullet';
  el.style.cssText = `
    width:  ${BULLET_SIZE_PX}px;
    height: ${BULLET_SIZE_PX}px;
    left: ${muzzleX}px;
    top:  ${muzzleY}px;
    transform: translate(-50%, -50%);
    opacity: 1;
  `;
  document.body.appendChild(el);

  const angleRad = BULLET_ANGLE_DEG * Math.PI / 180;
  const dirX     = Math.cos(angleRad);
  const dirY     = Math.sin(angleRad);

  // Capture muzzle at time of spawn (stays fixed even if gun recoils)
  const startX = muzzleX;
  const startY = muzzleY;
  let   t0     = null;

  const step = (ts) => {
    if (!t0) t0 = ts;
    const elapsed = ts - t0;

    if (elapsed >= BULLET_LIFE_MS) {
      el.remove();
      return;
    }

    const progress = elapsed / BULLET_LIFE_MS;
    const distance = (BULLET_SPEED * elapsed) / 1000;
    const fade     = progress > 0.5 ? 1 - (progress - 0.5) / 0.5 : 1;
    const scale    = 1 - progress * 0.6;

    el.style.left      = (startX + dirX * distance) + 'px';
    el.style.top       = (startY + dirY * distance) + 'px';
    el.style.opacity   = fade;
    el.style.transform = `translate(-50%, -50%) scale(${scale})`;

    requestAnimationFrame(step);
  };

  requestAnimationFrame(step);
}

// ── INPUT HANDLING ────────────────────────────────────────────────
document.addEventListener('pointerdown', (e) => {
  e.preventDefault();

  if (!cameraReady) {
    startCamera();
    return;
  }

  fire();

  if (AUTO_FIRE_ON_HOLD) {
    clearInterval(autoFireHandle);
    autoFireHandle = setInterval(fire, FIRE_RATE_MS);
  }
}, { passive: false });

document.addEventListener('pointerup', () => {
  clearInterval(autoFireHandle);
  autoFireHandle = null;
});

document.addEventListener('pointercancel', () => {
  clearInterval(autoFireHandle);
  autoFireHandle = null;
});

// Prevent iOS context menu on long press
document.addEventListener('contextmenu', (e) => e.preventDefault());
</script>

</body>
</html>
