<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Rolling Pin Throw</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
width: 100%; height: 100%;
overflow: hidden;
background: #000;
touch-action: none;
user-select: none;
-webkit-user-select: none;
}

/* ── LIVE CAMERA ─────────────────────────────────── */
#camera {
position: fixed;
inset: 0;
width: 100%; height: 100%;
object-fit: cover;
z-index: 0;
}

/* soft vignette for depth */
#vignette {
position: fixed; inset: 0; z-index: 1;
pointer-events: none;
background: radial-gradient(ellipse at 50% 46%,
transparent 40%, rgba(0,0,0,0.52) 100%);
}

/* ── ROLLING PIN CONTAINER ───────────────────────────
Positioned at rest near bottom-right, as if held.
JS rewrites this on resize and animates on throw.
──────────────────────────────────────────────────── */
#pin-wrap {
position: fixed;
z-index: 20;
pointer-events: none;
will-change: transform, opacity;
transform-origin: center center;
}

/* The actual rolling pin image inside the wrapper */
#pin-img {
display: block;
width: 100%;
height: 100%;
object-fit: contain;
/* motion-blur stretch is applied via CSS filter in JS */
will-change: filter, transform;
}

/* ── HAND / GRIP SHADOW ──────────────────────────────
A blurred dark ellipse that makes the pin look grounded
in the player’s hand before the throw.
──────────────────────────────────────────────────── */
#hand-shadow {
position: fixed;
z-index: 19;
pointer-events: none;
border-radius: 50%;
background: radial-gradient(ellipse at center,
rgba(0,0,0,0.55) 0%, transparent 70%);
will-change: transform, opacity;
transform-origin: center center;
}

/* ── TAP RIPPLE (throw confirmation) ─────────────────
Brief radial pulse at the tap point.
──────────────────────────────────────────────────── */
.tap-ripple {
position: fixed;
z-index: 30;
pointer-events: none;
border-radius: 50%;
border: 2px solid rgba(255, 230, 180, 0.7);
width: 10px; height: 10px;
transform: translate(-50%, -50%) scale(1);
animation: ripple-expand 0.45s cubic-bezier(0.2, 0.6, 0.4, 1) forwards;
}
@keyframes ripple-expand {
0%   { transform: translate(-50%,-50%) scale(1);   opacity: 0.85; }
100% { transform: translate(-50%,-50%) scale(8);   opacity: 0;    }
}

/* ── START SCREEN ────────────────────────────────── */
#start-screen {
position: fixed; inset: 0; z-index: 50;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
background: #000;
gap: 24px;
transition: opacity 0.55s ease;
}
#start-screen.hidden { opacity: 0; pointer-events: none; }

#start-icon {
font-size: 68px;
animation: bob 2.2s ease-in-out infinite;
}
@keyframes bob {
0%, 100% { transform: translateY(0) rotate(-8deg); }
50%       { transform: translateY(-10px) rotate(8deg); }
}
#start-label {
font-family: Georgia, ‘Times New Roman’, serif;
font-size: clamp(16px, 4vw, 21px);
letter-spacing: 0.18em;
text-transform: uppercase;
color: rgba(255, 240, 210, 0.92);
}
#start-sub {
font-family: Georgia, serif;
font-size: 12px;
letter-spacing: 0.14em;
color: rgba(255, 255, 255, 0.26);
text-transform: uppercase;
}
#start-error {
font-family: ‘Courier New’, monospace;
font-size: 11px;
color: rgba(255, 100, 80, 0.85);
text-align: center;
max-width: 80vw;
line-height: 1.6;
display: none;
}
</style>

</head>
<body>

<video id="camera" autoplay playsinline muted></video>

<div id="vignette"></div>

<!-- hand grip shadow (sits behind pin) -->

<div id="hand-shadow"></div>

<!-- Rolling pin wrapper + image
     If rolling-pin.png is present in the repo, it will be used.
     If not, a high-quality SVG data-URI fallback is used that
     renders a convincingly realistic wooden rolling pin with
     proper 3D shading, grain lines, and metal end caps — far
     better than canvas shapes. -->

<div id="pin-wrap">
  <img id="pin-img" alt="" draggable="false"
       onerror="useFallbackPin()">
</div>

<div id="start-screen">
  <div id="start-icon">🥖</div>
  <div id="start-label">Tap to Throw</div>
  <div id="start-sub">rolling pin throw</div>
  <div id="start-error"></div>
</div>

<script>
/* ===================================================================
   ██████  TUNING CONSTANTS  ██████
   ===================================================================
   Tweak these to adjust the feel of the throw on your device.
=================================================================== */

// ── Pin image source ──────────────────────────────────────────────
// Place a transparent PNG/WebP named rolling-pin.png in your repo
// root for a photographic look. If the file is missing the built-in
// SVG fallback is used automatically.
const PIN_SRC = 'rolling-pin.png';

// ── Rest position (where pin sits before throw) ───────────────────
// As % of viewport. Pin is right-anchored then offset by these.
const PIN_REST_RIGHT_VW  = -8;   // vw from right edge (neg = off-screen)
const PIN_REST_BOTTOM_VH = -6;   // vh from bottom edge (neg = off-screen)

// ── Pin size ──────────────────────────────────────────────────────
const PIN_WIDTH_VW = 78;   // width as % of viewport width

// ── Pin rotation at rest (tipped so handle is lower-right) ────────
const PIN_REST_ROT_DEG = -34;  // degrees (neg = barrel toward upper-left)

// ── Throw trajectory ──────────────────────────────────────────────
// Angle (degrees) the pin travels during the throw.
// 0 = straight right, -90 = straight up, -50 = upper-right typical.
const THROW_ANGLE_DEG  = -62;

// Distance the pin travels across the screen (in viewport widths).
// 1.6 = pin fully exits the screen.
const THROW_DISTANCE_VW = 1.65;

// Throw duration in milliseconds.
const THROW_DURATION_MS = 420;

// ── Spin ─────────────────────────────────────────────────────────
// Total degrees of rotation during a single throw.
// 720 = two full rotations, 1080 = three.
const SPIN_TOTAL_DEG = 900;

// ── Wind-up before launch ─────────────────────────────────────────
// Brief backward motion before the throw — makes it feel physical.
const WINDUP_DIST_PX   = 28;   // pixels pulled back
const WINDUP_ROT_DEG   = 14;   // extra rotation pulled back
const WINDUP_MS        = 95;   // wind-up duration

// ── Scale during flight (perspective shrink) ──────────────────────
// Pin starts at 1.0 and scales to this value as it travels away.
const THROW_END_SCALE  = 0.28;

// ── Motion blur ───────────────────────────────────────────────────
// Whether to apply a motion blur filter during peak throw speed.
const MOTION_BLUR_ON   = true;
const MOTION_BLUR_PX   = 5;    // max blur in pixels

// ── Reset delay ───────────────────────────────────────────────────
// ms after throw ends before pin reappears at rest position.
const RESET_DELAY_MS   = 320;

// ── Fire rate throttle ────────────────────────────────────────────
// Minimum ms between throws (prevents accidental double-tap throws).
const MIN_THROW_INTERVAL_MS = 600;

/* ===================================================================
   BUILT-IN SVG ROLLING PIN
   ───────────────────────────────────────────────────────────────────
   This SVG is a realistic wooden rolling pin rendered from a 3/4
   perspective angle so it reads as 3D. It features:
     • Warm maple-wood grain gradients with individual grain lines
     • Cylindrical barrel with proper highlight + shadow rolls
     • Brushed stainless steel end caps with radial reflections
     • Cast shadow beneath for grounding
   Much more convincing than flat canvas shapes.
   Override by placing rolling-pin.png in your repo.
=================================================================== */
const FALLBACK_SVG = `<svg xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 640 200" width="640" height="200">
<defs>
  <!-- Wood grain base — warm maple -->
  <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#f0c97a"/>
    <stop offset="8%"   stop-color="#e8b85c"/>
    <stop offset="22%"  stop-color="#dda03c"/>
    <stop offset="38%"  stop-color="#c8882a"/>
    <stop offset="52%"  stop-color="#b87020"/>
    <stop offset="65%"  stop-color="#c88228"/>
    <stop offset="78%"  stop-color="#dda030"/>
    <stop offset="90%"  stop-color="#e8b84a"/>
    <stop offset="100%" stop-color="#eed068"/>
  </linearGradient>
  <!-- Highlight roll across top of barrel -->
  <linearGradient id="hl" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="rgba(255,255,220,0.55)"/>
    <stop offset="18%"  stop-color="rgba(255,240,180,0.22)"/>
    <stop offset="55%"  stop-color="rgba(0,0,0,0)"/>
    <stop offset="82%"  stop-color="rgba(0,0,0,0.18)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.34)"/>
  </linearGradient>
  <!-- End-cap steel gradient -->
  <radialGradient id="cap" cx="40%" cy="35%" r="68%">
    <stop offset="0%"   stop-color="#e8e8e8"/>
    <stop offset="28%"  stop-color="#c0c0c0"/>
    <stop offset="55%"  stop-color="#888"/>
    <stop offset="78%"  stop-color="#aaa"/>
    <stop offset="100%" stop-color="#666"/>
  </radialGradient>
  <!-- End-cap for right side (slightly darker, facing away) -->
  <radialGradient id="cap2" cx="60%" cy="40%" r="65%">
    <stop offset="0%"   stop-color="#d0d0d0"/>
    <stop offset="35%"  stop-color="#909090"/>
    <stop offset="65%"  stop-color="#606060"/>
    <stop offset="100%" stop-color="#484848"/>
  </radialGradient>
  <!-- Handle gradient -->
  <linearGradient id="hnd" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#f2cc7e"/>
    <stop offset="12%"  stop-color="#e0a840"/>
    <stop offset="42%"  stop-color="#b87020"/>
    <stop offset="68%"  stop-color="#c88228"/>
    <stop offset="100%" stop-color="#e8b84a"/>
  </linearGradient>
  <!-- Handle highlight -->
  <linearGradient id="hhl" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="rgba(255,250,200,0.5)"/>
    <stop offset="30%"  stop-color="rgba(255,240,180,0.15)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.2)"/>
  </linearGradient>
  <!-- Collar ring gradient -->
  <linearGradient id="col" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#d8d8d8"/>
    <stop offset="30%"  stop-color="#a0a0a0"/>
    <stop offset="60%"  stop-color="#686868"/>
    <stop offset="100%" stop-color="#888"/>
  </linearGradient>
  <!-- Drop shadow filter -->
  <filter id="ds" x="-8%" y="-30%" width="116%" height="200%">
    <feDropShadow dx="0" dy="8" stdDeviation="7"
      flood-color="rgba(0,0,0,0.55)"/>
  </filter>
  <!-- Subtle inner glow on barrel edge -->
  <filter id="glow">
    <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="b"/>
    <feComposite in="SourceGraphic" in2="b" operator="over"/>
  </filter>
</defs>

<!-- ── CAST SHADOW (underneath, blurred) ── -->
<ellipse cx="320" cy="194" rx="290" ry="10"
  fill="rgba(0,0,0,0.28)" filter="url(#ds)"/>

<!-- ── LEFT HANDLE ── -->
<rect x="4" y="72" width="92" height="56" rx="10"
  fill="url(#hnd)" filter="url(#ds)"/>
<rect x="4" y="72" width="92" height="56" rx="10"
  fill="url(#hhl)"/>
<!-- handle grain lines -->
<line x1="18" y1="72" x2="18" y2="128" stroke="rgba(0,0,0,0.12)" stroke-width="1.2"/>
<line x1="34" y1="72" x2="34" y2="128" stroke="rgba(0,0,0,0.09)" stroke-width="0.9"/>
<line x1="52" y1="72" x2="52" y2="128" stroke="rgba(0,0,0,0.10)" stroke-width="1.0"/>
<line x1="70" y1="72" x2="70" y2="128" stroke="rgba(0,0,0,0.08)" stroke-width="0.8"/>
<line x1="86" y1="72" x2="86" y2="128" stroke="rgba(0,0,0,0.09)" stroke-width="0.9"/>
<!-- handle end knob -->
<ellipse cx="8" cy="100" rx="9" ry="26"
  fill="url(#cap)" filter="url(#ds)"/>

<!-- ── LEFT COLLAR ── -->
<rect x="94" y="62" width="30" height="76" rx="5"
  fill="url(#col)" filter="url(#ds)"/>
<!-- collar highlight ring -->
<rect x="94" y="62" width="10" height="76" rx="3"
  fill="rgba(255,255,255,0.18)"/>
<!-- collar screw detail -->
<circle cx="109" cy="88"  r="3.5" fill="#555"/>
<circle cx="109" cy="112" r="3.5" fill="#555"/>
<circle cx="109" cy="88"  r="1.5" fill="#888"/>
<circle cx="109" cy="112" r="1.5" fill="#888"/>

<!-- ── MAIN BARREL ── -->
<rect x="122" y="44" width="396" height="112" rx="18"
  fill="url(#wg)" filter="url(#ds)"/>
<!-- Barrel cylinder shading overlay -->
<rect x="122" y="44" width="396" height="112" rx="18"
  fill="url(#hl)"/>
<!-- wood grain lines on barrel -->
<line x1="148" y1="44" x2="144" y2="156" stroke="rgba(0,0,0,0.07)" stroke-width="1.4"/>
<line x1="178" y1="44" x2="174" y2="156" stroke="rgba(100,50,0,0.08)" stroke-width="1.0"/>
<line x1="210" y1="44" x2="206" y2="156" stroke="rgba(0,0,0,0.06)" stroke-width="1.2"/>
<line x1="246" y1="44" x2="242" y2="156" stroke="rgba(100,50,0,0.07)" stroke-width="0.9"/>
<line x1="284" y1="44" x2="280" y2="156" stroke="rgba(0,0,0,0.065)" stroke-width="1.1"/>
<line x1="320" y1="44" x2="316" y2="156" stroke="rgba(100,50,0,0.06)" stroke-width="1.0"/>
<line x1="358" y1="44" x2="354" y2="156" stroke="rgba(0,0,0,0.06)" stroke-width="1.2"/>
<line x1="394" y1="44" x2="390" y2="156" stroke="rgba(100,50,0,0.07)" stroke-width="0.9"/>
<line x1="430" y1="44" x2="426" y2="156" stroke="rgba(0,0,0,0.065)" stroke-width="1.0"/>
<line x1="466" y1="44" x2="462" y2="156" stroke="rgba(100,50,0,0.06)" stroke-width="1.1"/>
<line x1="498" y1="44" x2="494" y2="156" stroke="rgba(0,0,0,0.07)" stroke-width="0.9"/>
<!-- subtle horizontal grain wave -->
<path d="M122,82 Q200,78 280,84 Q360,90 440,82 Q500,76 518,80"
  stroke="rgba(0,0,0,0.04)" stroke-width="1.5" fill="none"/>
<path d="M122,118 Q200,114 280,120 Q360,126 440,118 Q500,112 518,116"
  stroke="rgba(0,0,0,0.04)" stroke-width="1.5" fill="none"/>
<!-- barrel top specular streak -->
<rect x="130" y="48" width="380" height="18" rx="9"
  fill="rgba(255,255,230,0.28)"/>
<rect x="150" y="50" width="340" height="6" rx="3"
  fill="rgba(255,255,255,0.18)"/>

<!-- ── RIGHT COLLAR ── -->
<rect x="516" y="62" width="30" height="76" rx="5"
  fill="url(#col)" filter="url(#ds)"/>
<rect x="536" y="62" width="10" height="76" rx="3"
  fill="rgba(0,0,0,0.14)"/>
<circle cx="531" cy="88"  r="3.5" fill="#555"/>
<circle cx="531" cy="112" r="3.5" fill="#555"/>
<circle cx="531" cy="88"  r="1.5" fill="#888"/>
<circle cx="531" cy="112" r="1.5" fill="#888"/>

<!-- ── RIGHT HANDLE ── -->
<rect x="544" y="72" width="92" height="56" rx="10"
  fill="url(#hnd)" filter="url(#ds)"/>
<rect x="544" y="72" width="92" height="56" rx="10"
  fill="url(#hhl)"/>
<line x1="558" y1="72" x2="558" y2="128" stroke="rgba(0,0,0,0.12)" stroke-width="1.2"/>
<line x1="574" y1="72" x2="574" y2="128" stroke="rgba(0,0,0,0.09)" stroke-width="0.9"/>
<line x1="592" y1="72" x2="592" y2="128" stroke="rgba(0,0,0,0.10)" stroke-width="1.0"/>
<line x1="610" y1="72" x2="610" y2="128" stroke="rgba(0,0,0,0.08)" stroke-width="0.8"/>
<line x1="626" y1="72" x2="626" y2="128" stroke="rgba(0,0,0,0.09)" stroke-width="0.9"/>
<ellipse cx="632" cy="100" rx="9" ry="26"
  fill="url(#cap2)" filter="url(#ds)"/>
</svg>`;

/* ===================================================================
   RUNTIME STATE
=================================================================== */
const $cam    = document.getElementById('camera');
const $start  = document.getElementById('start-screen');
const $errEl  = document.getElementById('start-error');
const $wrap   = document.getElementById('pin-wrap');
const $img    = document.getElementById('pin-img');
const $shadow = document.getElementById('hand-shadow');

let cameraReady  = false;
let throwing     = false;
let lastThrow    = 0;

// Rest transform (set by positionPin, reused on reset)
let restLeft = 0, restTop = 0, restW = 0, restH = 0;

/* ===================================================================
   FALLBACK: use inline SVG if rolling-pin.png is missing
=================================================================== */
function useFallbackPin() {
  const blob = new Blob([FALLBACK_SVG], { type: 'image/svg+xml' });
  const url  = URL.createObjectURL(blob);
  $img.src   = url;
}

// Kick off with the external image; onerror will swap to SVG
$img.src = PIN_SRC;
$img.addEventListener('load', positionPin);

/* ===================================================================
   PIN LAYOUT — called on load, resize, orientation change
=================================================================== */
function getSafeAreaBottom() {
  const probe = document.createElement('div');
  probe.style.cssText = 'position:fixed;bottom:0;left:0;width:1px;height:env(safe-area-inset-bottom,0px);pointer-events:none;visibility:hidden;';
  document.body.appendChild(probe);
  const h = probe.getBoundingClientRect().height;
  probe.remove();
  return h;
}

function positionPin() {
  const vw  = window.innerWidth;
  const vh  = window.innerHeight;
  const sab = getSafeAreaBottom();

  // Natural aspect ratio of whichever image loaded
  const ratio = ($img.naturalWidth && $img.naturalHeight)
    ? $img.naturalHeight / $img.naturalWidth
    : 200 / 640; // SVG viewBox aspect

  const w = vw * (PIN_WIDTH_VW / 100);
  const h = w * ratio;

  const rightOff  = vw * (PIN_REST_RIGHT_VW  / 100);
  const bottomOff = vh * (PIN_REST_BOTTOM_VH / 100);

  const left = vw - w + rightOff;
  const top  = vh - h - bottomOff - sab;

  restLeft = left;
  restTop  = top;
  restW    = w;
  restH    = h;

  applyRestPose(false);

  // Size the hand shadow accordingly
  $shadow.style.cssText = `
    position: fixed; z-index: 19; pointer-events: none;
    width:  ${w * 0.38}px;
    height: ${h * 0.55}px;
    left:   ${left + w * 0.58}px;
    top:    ${top  + h * 0.42}px;
    border-radius: 50%;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0.45) 0%, transparent 70%);
    transform: rotate(${PIN_REST_ROT_DEG}deg);
    transition: opacity 0.25s ease;
    opacity: 1;
  `;
}

function applyRestPose(animate) {
  $wrap.style.cssText = `
    position: fixed;
    left:   ${restLeft}px;
    top:    ${restTop}px;
    width:  ${restW}px;
    height: ${restH}px;
    z-index: 20;
    pointer-events: none;
    will-change: transform, opacity;
    transform-origin: center center;
    transform: rotate(${PIN_REST_ROT_DEG}deg) scale(1);
    opacity: 1;
    ${animate ? 'transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), opacity 0.18s ease;' : ''}
  `;
}

window.addEventListener('resize', positionPin);
window.addEventListener('orientationchange', () => setTimeout(positionPin, 340));

/* ===================================================================
   THROW ANIMATION
   ─────────────────────────────────────────────────────────────────
   Three phases:
     1. Wind-up  — pin pulls back slightly (WINDUP_MS)
     2. Launch   — pin flies across screen with spin + shrink
     3. Reset    — pin fades back to rest position
=================================================================== */
function throwPin(tapX, tapY) {
  const now = performance.now();
  if (throwing || now - lastThrow < MIN_THROW_INTERVAL_MS) return;
  throwing  = true;
  lastThrow = now;

  if (navigator.vibrate) navigator.vibrate(22);
  spawnTapRipple(tapX, tapY);

  const vw       = window.innerWidth;
  const angleRad = THROW_ANGLE_DEG * Math.PI / 180;
  const totalDist = vw * THROW_DISTANCE_VW;
  const endX     = Math.cos(angleRad) * totalDist;
  const endY     = Math.sin(angleRad) * totalDist;

  // ── Phase 1: Wind-up ──
  $shadow.style.opacity = '0';

  $wrap.style.transition =
    `transform ${WINDUP_MS}ms cubic-bezier(0.4, 0, 0.6, 1)`;
  $wrap.style.transform  =
    `rotate(${PIN_REST_ROT_DEG - WINDUP_ROT_DEG}deg) translate(${-WINDUP_DIST_PX}px, ${WINDUP_DIST_PX * 0.5}px) scale(1.04)`;

  // ── Phase 2: Launch ──
  setTimeout(() => {
    const totalRot   = PIN_REST_ROT_DEG + SPIN_TOTAL_DEG;
    const easing     = 'cubic-bezier(0.22, 0.8, 0.52, 0.98)';
    const blurFilter = MOTION_BLUR_ON
      ? `blur(${MOTION_BLUR_PX}px)`
      : 'none';

    $wrap.style.transition =
      `transform ${THROW_DURATION_MS}ms ${easing},
       opacity   ${THROW_DURATION_MS * 0.85}ms ease-in ${THROW_DURATION_MS * 0.15}ms,
       filter    ${THROW_DURATION_MS}ms ${easing}`;

    $wrap.style.transform =
      `translate(${endX}px, ${endY}px) rotate(${totalRot}deg) scale(${THROW_END_SCALE})`;
    $wrap.style.opacity = '0';
    $wrap.style.filter  = blurFilter;

    // ── Phase 3: Reset ──
    setTimeout(() => {
      // Instantly snap back to rest (no transition) then fade in
      $wrap.style.transition = 'none';
      $wrap.style.filter     = 'none';
      applyRestPose(false);

      // Force reflow then animate in
      void $wrap.offsetWidth;

      $wrap.style.transition =
        `transform 0.28s cubic-bezier(0.34,1.4,0.64,1),
         opacity   0.22s ease-out`;
      $wrap.style.opacity = '1';

      // Re-show hand shadow
      $shadow.style.opacity = '1';

      setTimeout(() => {
        throwing = false;
      }, 300);

    }, THROW_DURATION_MS + RESET_DELAY_MS);

  }, WINDUP_MS);
}

/* ===================================================================
   TAP RIPPLE EFFECT
=================================================================== */
function spawnTapRipple(x, y) {
  const el = document.createElement('div');
  el.className = 'tap-ripple';
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 500);
}

/* ===================================================================
   CAMERA
=================================================================== */
async function startCamera() {
  if (cameraReady) return;

  const tryStart = async (constraints) => {
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    $cam.srcObject = stream;
    await $cam.play();
    cameraReady = true;
    $start.classList.add('hidden');
    setTimeout(() => { $start.style.display = 'none'; }, 650);
    positionPin();
  };

  try {
    await tryStart({
      video: {
        facingMode: { exact: 'environment' },
        width:  { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    });
  } catch {
    try {
      await tryStart({ video: { facingMode: 'environment' }, audio: false });
    } catch (e) {
      document.getElementById('start-label').textContent = 'Camera unavailable';
      $errEl.style.display = 'block';
      $errEl.textContent   = e.message;
    }
  }
}

/* ===================================================================
   INPUT
=================================================================== */
document.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  if (!cameraReady) {
    startCamera();
    return;
  }
  throwPin(e.clientX, e.clientY);
}, { passive: false });

document.addEventListener('contextmenu', (e) => e.preventDefault());

/* ===================================================================
   INITIAL LAYOUT
   (image may already be in browser cache)
=================================================================== */
positionPin();
</script>

</body>
</html>
