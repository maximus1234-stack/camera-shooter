<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Rainbow Throw</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  #camera {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  #vignette {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 48%,
      transparent 42%, rgba(0,0,0,0.48) 100%);
  }

  #plunger-wrap {
    position: fixed;
    z-index: 20;
    pointer-events: none;
    will-change: transform, opacity;
  }

  #plunger-img {
    display: block;
    width: 100%; height: 100%;
    object-fit: contain;
    will-change: transform, filter;
  }

  /* Suction ring — rainbow tint to match the object */
  #suction-ring {
    position: fixed;
    z-index: 19;
    pointer-events: none;
    border-radius: 50%;
    border: 3px solid rgba(220, 180, 255, 0.85);
    box-shadow:
      0 0 14px 5px rgba(200, 150, 255, 0.5),
      inset 0 0 8px 2px rgba(180, 220, 255, 0.3);
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.2);
    width: 80px; height: 80px;
  }

  .tap-ripple {
    position: fixed; z-index: 30;
    pointer-events: none;
    border-radius: 50%;
    border: 2px solid rgba(220, 200, 255, 0.65);
    width: 10px; height: 10px;
    transform: translate(-50%, -50%) scale(1);
    animation: ripple 0.42s cubic-bezier(0.2, 0.6, 0.4, 1) forwards;
  }
  @keyframes ripple {
    0%   { transform: translate(-50%,-50%) scale(1); opacity: 0.8; }
    100% { transform: translate(-50%,-50%) scale(9); opacity: 0;   }
  }

  #start-screen {
    position: fixed; inset: 0; z-index: 50;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000; gap: 24px;
    transition: opacity 0.5s ease;
  }
  #start-screen.hidden { opacity: 0; pointer-events: none; }

  #start-icon {
    font-size: 64px;
    animation: bob 2s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0)     rotate(-6deg); }
    50%       { transform: translateY(-10px) rotate(6deg);  }
  }
  #start-label {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(16px, 4vw, 21px);
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255, 245, 230, 0.9);
  }
  #start-sub {
    font-family: Georgia, serif; font-size: 12px;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,255,255,0.25);
  }
  #start-error {
    font-family: 'Courier New', monospace; font-size: 11px;
    color: rgba(255,90,70,0.85); text-align: center;
    max-width: 80vw; line-height: 1.6; display: none;
  }
</style>
</head>
<body>

<video id="camera" autoplay playsinline muted></video>
<div id="vignette"></div>
<div id="suction-ring"></div>

<div id="plunger-wrap">
  <img id="plunger-img" src="banana.png" alt="" draggable="false">
</div>

<div id="start-screen">
  <div id="start-icon">🌈</div>
  <div id="start-label">Tap to Throw</div>
  <div id="start-sub">rainbow throw</div>
  <div id="start-error"></div>
</div>

<script>
/* ===================================================================
   ████  TUNING CONSTANTS  ████
   Tuned for banana.png — a wide, diagonal, spiral object.
   The image is roughly landscape, tip pointing upper-left.
=================================================================== */

// ── Image source ─────────────────────────────────────────────────
const PLUNGER_SRC = 'banana.png';

// ── Object size at rest ──────────────────────────────────────────
// Wider than plunger since this is a horizontal-ish object.
const PLUNGER_WIDTH_VW = 72;

// ── Rest position ─────────────────────────────────────────────────
// Bottom-center, partially off-screen so it feels "held."
const REST_BOTTOM_VH  = -10;   // vh from bottom (neg = more off-screen)
const REST_OFFSET_VW  = 4;     // slight nudge right of center

// ── Rest rotation ─────────────────────────────────────────────────
// Object naturally runs diagonally — tip toward upper-left.
// ~-35deg mirrors how you'd hold it aimed forward.
const REST_ROT_DEG    = -35;

// ── Throw target (where it sticks) ────────────────────────────────
// Upper-center of screen — feels like "straight ahead."
const TARGET_X_VW     = 50;   // % from left
const TARGET_Y_VH     = 30;   // % from top

// ── Throw timing ─────────────────────────────────────────────────
const THROW_DURATION_MS = 400;
const WINDUP_MS         = 80;

// ── Perspective shrink during flight ──────────────────────────────
// Doesn't shrink as aggressively as a long plunger — wider object
// stays more visible as it recedes.
const THROW_END_SCALE   = 0.62;

// ── Wobble during flight ──────────────────────────────────────────
// Slight tumble — a spiraling object has natural wobble.
const WOBBLE_DEG        = 18;

// ── Impact squash ─────────────────────────────────────────────────
// Cup-end is the suction base — squash wide, compress height.
const SQUASH_X          = 1.18;
const SQUASH_Y          = 0.78;
const SQUASH_MS         = 75;
const SETTLE_MS         = 155;

// ── Stick & reset timing ─────────────────────────────────────────
const STICK_DURATION_MS = 900;
const RESET_DELAY_MS    = 200;

// ── Fire rate throttle ────────────────────────────────────────────
const MIN_THROW_MS      = 700;

/* ===================================================================
   RUNTIME
=================================================================== */
const $cam    = document.getElementById('camera');
const $start  = document.getElementById('start-screen');
const $errEl  = document.getElementById('start-error');
const $wrap   = document.getElementById('plunger-wrap');
const $img    = document.getElementById('plunger-img');
const $ring   = document.getElementById('suction-ring');

let cameraReady = false;
let state       = 'idle';
let lastThrow   = 0;
let REST        = { left:0, top:0, w:0, h:0, cx:0, cy:0 };

$img.addEventListener('load', layoutRest);

/* ===================================================================
   LAYOUT
=================================================================== */
function getSafeAreaBottom() {
  const p = document.createElement('div');
  p.style.cssText = 'position:fixed;bottom:0;left:0;width:1px;height:env(safe-area-inset-bottom,0px);pointer-events:none;visibility:hidden;';
  document.body.appendChild(p);
  const h = p.getBoundingClientRect().height;
  p.remove();
  return h;
}

function layoutRest() {
  const vw  = window.innerWidth;
  const vh  = window.innerHeight;
  const sab = getSafeAreaBottom();

  // Use natural image ratio; fallback to rough ratio of the rainbow object
  const ratio = ($img.naturalWidth && $img.naturalHeight)
    ? $img.naturalHeight / $img.naturalWidth
    : 0.55;   // banana.png is wider than tall

  const w = vw * (PLUNGER_WIDTH_VW / 100);
  const h = w * ratio;

  const cx        = vw * 0.5 + vw * (REST_OFFSET_VW / 100);
  const bottomOff = vh * (REST_BOTTOM_VH / 100);

  REST = {
    left: cx - w / 2,
    top:  vh - h - bottomOff - sab,
    w, h, cx,
    cy: vh - h / 2 - bottomOff - sab
  };

  if (state === 'idle') applyRest(false);
}

function applyRest(animate) {
  // transform-origin at the suction base end of this object.
  // The object's "business end" (suction cup / base ring) is
  // at the RIGHT side of the image based on the upload, so
  // origin at ~82% 55% keeps the base as the pivot.
  $wrap.style.cssText = `
    position: fixed;
    left:   ${REST.left}px;
    top:    ${REST.top}px;
    width:  ${REST.w}px;
    height: ${REST.h}px;
    z-index: 20;
    pointer-events: none;
    will-change: transform, opacity;
    transform-origin: 82% 55%;
    transform: rotate(${REST_ROT_DEG}deg) scale(1);
    opacity: 1;
    ${animate
      ? 'transition: transform 0.24s cubic-bezier(0.34,1.5,0.64,1), opacity 0.2s ease;'
      : 'transition: none;'}
  `;
}

window.addEventListener('resize', layoutRest);
window.addEventListener('orientationchange', () => setTimeout(layoutRest, 340));

/* ===================================================================
   THROW
=================================================================== */
function startThrow(tapX, tapY) {
  const now = performance.now();
  if (state !== 'idle' || now - lastThrow < MIN_THROW_MS) return;
  state     = 'windup';
  lastThrow = now;

  if (navigator.vibrate) navigator.vibrate(20);
  spawnRipple(tapX, tapY);

  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // Transform-origin (pivot) world position at rest
  const pivotX = REST.left + REST.w * 0.82;
  const pivotY = REST.top  + REST.h * 0.55;

  const endX = vw * (TARGET_X_VW / 100);
  const endY = vh * (TARGET_Y_VH / 100);

  const dX = endX - pivotX;
  const dY = endY - pivotY;

  // ── Wind-up: pull back and down ───────────────────────────────
  $wrap.style.transformOrigin = '82% 55%';
  $wrap.style.transition =
    `transform ${WINDUP_MS}ms cubic-bezier(0.4,0,0.6,1)`;
  $wrap.style.transform =
    `rotate(${REST_ROT_DEG + 12}deg) translate(0px, 24px) scale(1.05)`;

  // ── Flight ────────────────────────────────────────────────────
  setTimeout(() => {
    state = 'flying';

    // For this spiral object, rotate toward ~0deg at target so
    // the tip points straight at the viewer when it sticks.
    const midRot = REST_ROT_DEG - WOBBLE_DEG;
    const endRot = -20;  // slightly tilted at rest on surface

    const flyId   = `fly_${Date.now()}`;
    const styleEl = document.createElement('style');
    styleEl.id    = flyId;
    styleEl.textContent = `
      @keyframes obj_fly {
        0%   { transform: translate(0px,          0px)          rotate(${REST_ROT_DEG}deg) scale(1); }
        40%  { transform: translate(${dX*0.42}px, ${dY*0.42}px) rotate(${midRot}deg)       scale(${1-(1-THROW_END_SCALE)*0.38}); }
        100% { transform: translate(${dX}px,      ${dY}px)      rotate(${endRot}deg)       scale(${THROW_END_SCALE}); }
      }
    `;
    document.head.appendChild(styleEl);

    $wrap.style.transition = 'none';
    $wrap.style.animation  =
      `obj_fly ${THROW_DURATION_MS}ms cubic-bezier(0.28,0.65,0.48,1) forwards`;

    // ── Impact squash ─────────────────────────────────────────
    setTimeout(() => {
      state = 'stuck';
      document.head.removeChild(styleEl);

      $wrap.style.animation = 'none';
      $wrap.style.transform =
        `translate(${dX}px, ${dY}px) rotate(${endRot}deg) scale(${THROW_END_SCALE})`;

      void $wrap.offsetWidth;
      $wrap.style.transition =
        `transform ${SQUASH_MS}ms cubic-bezier(0.2,0.8,0.4,1)`;
      $wrap.style.transform =
        `translate(${dX}px, ${dY}px) rotate(${endRot}deg)
         scale(${THROW_END_SCALE})
         scaleX(${SQUASH_X}) scaleY(${SQUASH_Y})`;

      showSuctionRing(endX, endY);

      // ── Settle ────────────────────────────────────────────
      setTimeout(() => {
        $wrap.style.transition =
          `transform ${SETTLE_MS}ms cubic-bezier(0.34,1.3,0.64,1)`;
        $wrap.style.transform =
          `translate(${dX}px, ${dY}px) rotate(${endRot}deg) scale(${THROW_END_SCALE})`;

        // ── Reset ─────────────────────────────────────────
        setTimeout(() => {
          state = 'resetting';
          $wrap.style.transition = 'opacity 0.18s ease';
          $wrap.style.opacity    = '0';

          setTimeout(() => {
            applyRest(false);
            void $wrap.offsetWidth;
            $wrap.style.transition =
              'transform 0.26s cubic-bezier(0.34,1.4,0.64,1), opacity 0.22s ease';
            $wrap.style.opacity = '1';
            setTimeout(() => { state = 'idle'; }, 300);
          }, RESET_DELAY_MS);

        }, STICK_DURATION_MS);

      }, SQUASH_MS);

    }, THROW_DURATION_MS);

  }, WINDUP_MS);
}

/* ===================================================================
   SUCTION RING
=================================================================== */
function showSuctionRing(x, y) {
  $ring.style.transition = 'none';
  $ring.style.left       = x + 'px';
  $ring.style.top        = y + 'px';
  $ring.style.opacity    = '0';
  $ring.style.transform  = 'translate(-50%,-50%) scale(0.15)';
  void $ring.offsetWidth;

  $ring.style.transition =
    'transform 0.18s cubic-bezier(0.2,0.8,0.4,1), opacity 0.12s ease-out';
  $ring.style.opacity   = '1';
  $ring.style.transform = 'translate(-50%,-50%) scale(1)';

  setTimeout(() => {
    $ring.style.transition =
      'transform 0.55s ease-out, opacity 0.55s ease-out';
    $ring.style.opacity   = '0';
    $ring.style.transform = 'translate(-50%,-50%) scale(1.7)';
  }, 180);
}

/* ===================================================================
   TAP RIPPLE
=================================================================== */
function spawnRipple(x, y) {
  const el = document.createElement('div');
  el.className = 'tap-ripple';
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 480);
}

/* ===================================================================
   CAMERA
=================================================================== */
async function startCamera() {
  if (cameraReady) return;

  const tryStart = async (c) => {
    const s = await navigator.mediaDevices.getUserMedia(c);
    $cam.srcObject = s;
    await $cam.play();
    cameraReady = true;
    $start.classList.add('hidden');
    setTimeout(() => { $start.style.display = 'none'; }, 650);
    layoutRest();
  };

  try {
    await tryStart({
      video: { facingMode: { exact: 'environment' },
               width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
  } catch {
    try {
      await tryStart({ video: { facingMode: 'environment' }, audio: false });
    } catch (e) {
      document.getElementById('start-label').textContent = 'Camera unavailable';
      $errEl.style.display = 'block';
      $errEl.textContent   = e.message;
    }
  }
}

/* ===================================================================
   INPUT
=================================================================== */
document.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  if (!cameraReady) { startCamera(); return; }
  startThrow(e.clientX, e.clientY);
}, { passive: false });

document.addEventListener('contextmenu', (e) => e.preventDefault());

/* ===================================================================
   INIT
=================================================================== */
layoutRest();
</script>
</body>
</html>
