<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

/* CAMERA */

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
}

/* GUN POSITION */

#gunWrap{
position:fixed;
inset:0;
pointer-events:none;
z-index:10;
}

#gun{

position:absolute;

/* first-person position */
right:-22vw;
bottom:-10vh;

/* size tuned for Pro Max */
width:155vw;
max-width:980px;

/* aiming angle */
transform-origin:72% 78%;
transform:rotate(-10deg);

filter:drop-shadow(0 14px 20px rgba(0,0,0,.45));

will-change:transform;

}

/* recoil */

.recoil{
animation:recoilKick 85ms ease-out;
}

@keyframes recoilKick{

0%{transform:rotate(-10deg) translate3d(0,0,0);}

45%{transform:rotate(-7deg) translate3d(-14px,16px,0);}

100%{transform:rotate(-10deg) translate3d(0,0,0);}

}

/* muzzle flash */

#muzzle{

position:fixed;

width:140px;
height:140px;

border-radius:50%;

pointer-events:none;

opacity:0;

background:
radial-gradient(circle,
rgba(255,255,255,1) 0%,
rgba(255,230,120,1) 25%,
rgba(255,170,0,.6) 45%,
rgba(255,90,0,.3) 65%,
transparent 75%);

mix-blend-mode:screen;

z-index:20;

transform:translate(-50%,-50%);

}

/* flash animation */

.flash{
animation:muzzleFlash 70ms ease-out;
}

@keyframes muzzleFlash{

0%{opacity:0; transform:translate(-50%,-50%) scale(.7);}

30%{opacity:1; transform:translate(-50%,-50%) scale(1);}

100%{opacity:0; transform:translate(-50%,-50%) scale(1.2);}

}

/* bullet */

.bullet{

position:fixed;

width:14px;
height:4px;

background:linear-gradient(90deg,#fff,#ffaa00);

border-radius:2px;

box-shadow:0 0 12px rgba(255,170,0,.9);

pointer-events:none;

z-index:15;

transform:translate(-50%,-50%);

}

</style>

</head>

<body>

<video id="camera" autoplay playsinline muted></video>

<div id="gunWrap">
<img id="gun"
src="https://pngimg.com/uploads/assault_rifle/assault_rifle_PNG1436.png">
</div>

<div id="muzzle"></div>

<script>

const video = document.getElementById("camera")
const gun = document.getElementById("gun")
const muzzle = document.getElementById("muzzle")

let started=false
let lastShot=0

/* muzzle location relative to gun */

const MUZZLE_X = 0.10
const MUZZLE_Y = 0.40

/* start camera */

async function startCamera(){

const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:{ideal:"environment"}},
audio:false
})

video.srcObject = stream

}

/* get barrel position */

function getMuzzlePoint(){

const r = gun.getBoundingClientRect()

const x = r.left + r.width * MUZZLE_X
const y = r.top + r.height * MUZZLE_Y

return {x,y}

}

/* recoil */

function recoil(){

gun.classList.remove("recoil")

void gun.offsetWidth

gun.classList.add("recoil")

}

/* muzzle flash */

function flash(x,y){

muzzle.style.left = x+"px"
muzzle.style.top = y+"px"

muzzle.classList.remove("flash")

void muzzle.offsetWidth

muzzle.classList.add("flash")

}

/* spawn bullet */

function spawnBullet(x,y){

const b = document.createElement("div")

b.className="bullet"

document.body.appendChild(b)

const angle = (-18) * Math.PI/180

const distance = Math.max(innerWidth,innerHeight)

const endX = x + Math.cos(angle) * -distance
const endY = y + Math.sin(angle) * distance

b.style.left = x+"px"
b.style.top = y+"px"

const start = performance.now()

function animate(t){

const p = (t-start)/220

if(p>=1){

b.remove()
return

}

const cx = x + (endX-x)*p
const cy = y + (endY-y)*p

b.style.left=cx+"px"
b.style.top=cy+"px"
b.style.opacity = 1-p

requestAnimationFrame(animate)

}

requestAnimationFrame(animate)

}

/* shooting */

function shoot(){

const now = Date.now()

if(now-lastShot<120) return

lastShot=now

const {x,y}=getMuzzlePoint()

if(navigator.vibrate) navigator.vibrate(25)

recoil()

flash(x,y)

spawnBullet(x,y)

}

/* tap to start / shoot */

document.body.addEventListener("click",async()=>{

if(!started){

await startCamera()

started=true

}

shoot()

})

</script>

</body>
</html>
