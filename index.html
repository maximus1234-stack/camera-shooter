<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
margin:0;
overflow:hidden;
background:black;
}

video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
}

/* gun image */
#gun{
position:fixed;
bottom:-20px;
left:50%;
transform:translateX(-50%);
width:420px;
pointer-events:none;
z-index:5;
}

/* muzzle flash */
#flash{
position:fixed;
top:40%;
left:50%;
transform:translateX(-50%);
width:120px;
height:120px;
background:radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,200,0,0.8) 40%, rgba(255,150,0,0.2) 70%, transparent 80%);
opacity:0;
pointer-events:none;
z-index:6;
transition:opacity 0.05s;
}

</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>

<img id="gun" src="https://pngimg.com/uploads/assault_rifle/assault_rifle_PNG1436.png">

<div id="flash"></div>

<script>

const video = document.getElementById("camera");
const flash = document.getElementById("flash");

navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})
.then(stream=>{
video.srcObject = stream;
});

/* shooting */

document.body.addEventListener("click",()=>{

navigator.vibrate(40);

/* flash effect */

flash.style.opacity=1;

setTimeout(()=>{
flash.style.opacity=0;
},60);

});

</script>

</body>
</html>
